<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>


  <!-- Subtle grid texture -->
  <g opacity="0.06" stroke="#7b8cde" stroke-width="0.5">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <!-- Outer diamond frame; centered at 100,100, half-height 56 -->
  <polygon points="100,44 156,100 100,156 44,100" fill="none" stroke="#4a5af7" stroke-width="1.4" opacity="0.5" filter="url(#glow)"/>
  <!-- Inner diamond -->
  <polygon points="100,58 136,94 100,130 64,94" fill="none" stroke="#7b8cde" stroke-width="0.9" opacity="0.35"/>
  <!-- V-shape (top half) -->
  <polyline points="52,52 100,100 148,52" fill="none" stroke="#c8d0ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowStrong)"/>
  <!-- M-shape (bottom half) -->
  <polyline points="52,148 68,100 100,122 132,100 148,148" fill="none" stroke="#c8d0ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowStrong)"/>

  <!-- Corner ticks -->
  <g stroke="#4a5af7" stroke-width="1.1" opacity="0.7" filter="url(#glow)">
    <line x1="96" y1="40" x2="104" y2="40"/>
    <line x1="96" y1="160" x2="104" y2="160"/>
    <line x1="40" y1="97" x2="40" y2="103"/>
    <line x1="160" y1="97" x2="160" y2="103"/>
  </g>

</svg>
